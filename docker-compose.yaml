version: "3.9"

services:
  mysql:
    image: mysql:8
    ports:
      - 3306:3306
    environment:
      MYSQL_DATABASE: gestionart
      MYSQL_USER: root
      MYSQL_PASSWORD: 1234
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - datos_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./gestionart_backend_ruben_y_jessica
    ports:
      - "8080:8080"
    environment:
      DB_USER: usuario
      DB_PASSWORD: secreto
    depends_on:
      mysql:
        condition: service_healthy

  # frontend:
  #   build: ./frontend
  #   ports:
  #     - "80:80"
  #   depends_on:
  #     - api

volumes:
  datos_mysql:
  datos_redis: